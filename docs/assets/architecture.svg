<svg viewBox="0 0 860 520" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
      .label-muted  { fill: #6b7280; }
      .label-primary { fill: #111827; }
      .label-secondary { fill: #4b5563; }
      .label-accent  { fill: #1d4ed8; }
      .label-success { fill: #15803d; }
      .label-warning { fill: #b45309; }
      .box-wifi    { fill: #eff6ff; stroke: #3b82f6; }
      .box-acoustic { fill: #f0fdf4; stroke: #22c55e; }
      .box-neuro   { fill: #fffbeb; stroke: #f59e0b; }
      .box-engine  { fill: #f9fafb; stroke: #3b82f6; }
      .box-output  { fill: #f9fafb; stroke: #d1d5db; }
      .box-caption { fill: #eff6ff; }
      .divider     { stroke: #d1d5db; }
      .arrow       { stroke: #6b7280; fill: none; }
      .arrowhead   { fill: #6b7280; }
      .caption-text { fill: #1d4ed8; }
    </style>
  </defs>

  <!-- INPUT LAYER HEADER -->
  <text x="430" y="28" text-anchor="middle" font-size="11" font-weight="500" class="label-muted" letter-spacing="1">INPUT LAYER</text>

  <!-- BOX 1: Passive WiFi -->
  <rect x="20" y="40" width="220" height="110" rx="10" class="box-wifi" stroke-width="1.5"/>
  <text x="130" y="66" text-anchor="middle" font-size="13" font-weight="600" class="label-accent">Passive bistatic WiFi</text>
  <text x="130" y="84" text-anchor="middle" font-size="11" class="label-secondary">(PCL)</text>
  <line x1="40" y1="94" x2="220" y2="94" class="divider" stroke-width="0.8"/>
  <text x="130" y="112" text-anchor="middle" font-size="11" class="label-secondary">cross-correlation</text>
  <text x="130" y="130" text-anchor="middle" font-size="11" class="label-secondary">range-Doppler map</text>

  <!-- BOX 2: Acoustic -->
  <rect x="320" y="40" width="220" height="110" rx="10" class="box-acoustic" stroke-width="1.5"/>
  <text x="430" y="66" text-anchor="middle" font-size="13" font-weight="600" class="label-success">Acoustic FMCW</text>
  <text x="430" y="84" text-anchor="middle" font-size="11" class="label-secondary">(18 – 22 kHz)</text>
  <line x1="340" y1="94" x2="520" y2="94" class="divider" stroke-width="0.8"/>
  <text x="430" y="112" text-anchor="middle" font-size="11" class="label-secondary">beat spectrum + TDOA</text>
  <text x="430" y="130" text-anchor="middle" font-size="11" class="label-secondary">cm-accurate position</text>

  <!-- BOX 3: Neuromotor -->
  <rect x="620" y="40" width="220" height="110" rx="10" class="box-neuro" stroke-width="1.5"/>
  <text x="730" y="66" text-anchor="middle" font-size="13" font-weight="600" class="label-warning">Neuromotor biomarkers</text>
  <text x="730" y="84" text-anchor="middle" font-size="11" class="label-secondary">(clinical tremor bands)</text>
  <line x1="640" y1="94" x2="820" y2="94" class="divider" stroke-width="0.8"/>
  <text x="730" y="112" text-anchor="middle" font-size="11" class="label-secondary">bandpass + FFT</text>
  <text x="730" y="130" text-anchor="middle" font-size="11" class="label-secondary">UPDRS proxy score</text>

  <!-- ARROWS: input → engine -->
  <line x1="190" y1="150" x2="345" y2="256" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="345,260 333,250 346,247" class="arrowhead"/>

  <line x1="430" y1="150" x2="430" y2="254" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="430,258 424,246 436,246" class="arrowhead"/>

  <line x1="670" y1="150" x2="517" y2="256" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="515,260 514,247 526,251" class="arrowhead"/>

  <!-- ENGINE BOX -->
  <rect x="180" y="258" width="500" height="90" rx="12" class="box-engine" stroke-width="2"/>
  <text x="430" y="288" text-anchor="middle" font-size="15" font-weight="600" class="label-primary">Unified inference engine</text>
  <text x="430" y="308" text-anchor="middle" font-size="11" class="label-secondary">Rust → WASM · attention-based multi-modal fusion</text>
  <text x="430" y="326" text-anchor="middle" font-size="11" class="label-secondary">zero-shot cross-environment · int4 quantised · &lt; 50 KB</text>

  <!-- ARROWS: engine → output -->
  <line x1="282" y1="348" x2="152" y2="406" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="150,410 148,397 161,402" class="arrowhead"/>

  <line x1="430" y1="348" x2="430" y2="406" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="430,410 424,398 436,398" class="arrowhead"/>

  <line x1="578" y1="348" x2="708" y2="406" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="710,410 699,400 712,398" class="arrowhead"/>

  <!-- OUTPUT LAYER HEADER -->
  <text x="430" y="400" text-anchor="middle" font-size="11" font-weight="500" class="label-muted" letter-spacing="1">OUTPUT LAYER</text>

  <!-- OUTPUT BOX 1 -->
  <rect x="20" y="412" width="230" height="72" rx="10" class="box-output" stroke-width="1.5"/>
  <text x="135" y="436" text-anchor="middle" font-size="12" font-weight="600" class="label-primary">navigator.physicSense</text>
  <text x="135" y="454" text-anchor="middle" font-size="11" class="label-secondary">Web API spec + polyfill</text>
  <text x="135" y="470" text-anchor="middle" font-size="11" class="label-secondary">WebExtension bridge</text>

  <!-- OUTPUT BOX 2 -->
  <rect x="315" y="412" width="230" height="72" rx="10" class="box-output" stroke-width="1.5"/>
  <text x="430" y="436" text-anchor="middle" font-size="12" font-weight="600" class="label-primary">Live dashboard</text>
  <text x="430" y="454" text-anchor="middle" font-size="11" class="label-secondary">Three.js 3-D pose + vitals</text>
  <text x="430" y="470" text-anchor="middle" font-size="11" class="label-secondary">real-time tremor timeline</text>

  <!-- OUTPUT BOX 3 -->
  <rect x="610" y="412" width="230" height="72" rx="10" class="box-output" stroke-width="1.5"/>
  <text x="725" y="436" text-anchor="middle" font-size="12" font-weight="600" class="label-primary">Federated mesh</text>
  <text x="725" y="454" text-anchor="middle" font-size="11" class="label-secondary">(ε,δ)-DP · FedAvg</text>
  <text x="725" y="470" text-anchor="middle" font-size="11" class="label-secondary">WebRTC peer-to-peer</text>

  <!-- BOTTOM CAPTION -->
  <rect x="20" y="500" width="820" height="18" rx="4" class="box-caption" opacity="0.6"/>
  <text x="430" y="513" text-anchor="middle" font-size="10" class="caption-text">Zero dedicated hardware · browser-native · passive receive only · raw data never leaves the device</text>

</svg>
