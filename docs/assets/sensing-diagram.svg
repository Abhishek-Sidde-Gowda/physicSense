<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <defs>
    <radialGradient id="roomGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e2535"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </radialGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <!-- WiFi wave rings -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="#0f1117" rx="12"/>

  <!-- Room outline -->
  <rect x="60" y="40" width="500" height="340" fill="url(#roomGrad)" rx="8" stroke="#2a3350" stroke-width="1.5"/>
  <text x="310" y="32" fill="#64748b" font-size="11" text-anchor="middle" font-weight="600" letter-spacing="1">ROOM</text>

  <!-- WiFi Router (top-left) -->
  <rect x="80" y="60" width="80" height="50" rx="8" fill="#1e2535" stroke="#2a3350" stroke-width="1.5"/>
  <text x="120" y="80" fill="#60a5fa" font-size="10" text-anchor="middle" font-weight="700">WiFi</text>
  <text x="120" y="95" fill="#60a5fa" font-size="10" text-anchor="middle" font-weight="700">Router</text>

  <!-- WiFi signal arcs from router -->
  <path d="M 160 85 Q 230 40 230 85" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <path d="M 160 85 Q 270 20 270 85" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <path d="M 160 85 Q 310 5 310 85" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.2"/>

  <!-- WiFi waves going to person -->
  <line x1="160" y1="85" x2="285" y2="185" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)" opacity="0.7"/>

  <!-- Person (stick figure in 3D style) -->
  <!-- Body shadow -->
  <ellipse cx="322" cy="340" rx="25" ry="8" fill="#000" opacity="0.4"/>
  <!-- Legs -->
  <line x1="305" y1="290" x2="295" y2="335" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
  <line x1="325" y1="290" x2="335" y2="335" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
  <!-- Body -->
  <line x1="315" y1="220" x2="315" y2="290" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
  <!-- Arms -->
  <line x1="315" y1="240" x2="285" y2="265" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
  <line x1="315" y1="240" x2="345" y2="265" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="315" cy="205" r="18" fill="#1e2535" stroke="#60a5fa" stroke-width="2.5"/>
  <!-- Tremor wave on hand -->
  <path d="M285,265 Q280,270 285,275 Q290,280 285,285" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.8"/>

  <!-- Reflected signal back to sensor node -->
  <line x1="297" y1="200" x2="165" y2="275" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)" opacity="0.8"/>

  <!-- Sensor Node (bottom-left) -->
  <rect x="80" y="250" width="80" height="60" rx="8" fill="#1e2535" stroke="#22c55e" stroke-width="1.5"/>
  <text x="120" y="274" fill="#22c55e" font-size="9" text-anchor="middle" font-weight="700">PhysicSense</text>
  <text x="120" y="288" fill="#22c55e" font-size="9" text-anchor="middle" font-weight="700">Node</text>
  <text x="120" y="302" fill="#64748b" font-size="8" text-anchor="middle">(passive)</text>

  <!-- Acoustic speaker/mic -->
  <rect x="430" y="280" width="100" height="70" rx="8" fill="#1e2535" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="480" y="306" fill="#f59e0b" font-size="9" text-anchor="middle" font-weight="700">Speaker</text>
  <text x="480" y="320" fill="#f59e0b" font-size="9" text-anchor="middle" font-weight="700">+ Mic</text>
  <text x="480" y="336" fill="#64748b" font-size="8" text-anchor="middle">18–22 kHz</text>

  <!-- Acoustic chirp to person -->
  <path d="M 430 300 Q 385 270 350 240" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-amber)" opacity="0.7"/>
  <!-- Echo back -->
  <path d="M 340 250 Q 370 280 420 305" fill="none" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- Acoustic wave rings from speaker -->
  <path d="M 430 310 Q 410 295 415 275" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  <path d="M 430 310 Q 400 288 408 262" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.25"/>

  <!-- Labels -->
  <!-- WiFi label -->
  <rect x="195" y="110" width="110" height="28" rx="4" fill="#1e2535" stroke="#3b82f6" stroke-width="1"/>
  <text x="250" y="125" fill="#60a5fa" font-size="10" text-anchor="middle" font-weight="600">① WiFi illumination</text>
  <text x="250" y="133" fill="#64748b" font-size="9" text-anchor="middle">passive bistatic</text>

  <!-- Reflection label -->
  <rect x="128" y="200" width="110" height="28" rx="4" fill="#1e2535" stroke="#22c55e" stroke-width="1"/>
  <text x="183" y="215" fill="#22c55e" font-size="10" text-anchor="middle" font-weight="600">② Reflection</text>
  <text x="183" y="223" fill="#64748b" font-size="9" text-anchor="middle">GCC-PHAT + Doppler</text>

  <!-- Acoustic label -->
  <rect x="360" y="230" width="110" height="28" rx="4" fill="#1e2535" stroke="#f59e0b" stroke-width="1"/>
  <text x="415" y="245" fill="#f59e0b" font-size="10" text-anchor="middle" font-weight="600">③ FMCW chirp</text>
  <text x="415" y="253" fill="#64748b" font-size="9" text-anchor="middle">4.3 cm resolution</text>

  <!-- Tremor label -->
  <rect x="345" y="160" width="110" height="28" rx="4" fill="#1e2535" stroke="#ef4444" stroke-width="1"/>
  <text x="400" y="175" fill="#ef4444" font-size="10" text-anchor="middle" font-weight="600">④ Tremor detected</text>
  <text x="400" y="183" fill="#64748b" font-size="9" text-anchor="middle">3–12 Hz classification</text>
  <line x1="345" y1="174" x2="310" y2="240" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>

  <!-- Right panel — pipeline -->
  <rect x="580" y="40" width="200" height="340" rx="8" fill="#161b27" stroke="#2a3350" stroke-width="1.5"/>
  <text x="680" y="62" fill="#64748b" font-size="10" text-anchor="middle" font-weight="700" letter-spacing="1">PIPELINE</text>

  <!-- Pipeline steps -->
  <rect x="598" y="72" width="164" height="36" rx="6" fill="#1e2535" stroke="#3b82f6" stroke-width="1"/>
  <text x="680" y="88" fill="#60a5fa" font-size="10" text-anchor="middle" font-weight="700">Passive PCL</text>
  <text x="680" y="101" fill="#64748b" font-size="9" text-anchor="middle">Range · Velocity · AoA</text>

  <line x1="680" y1="108" x2="680" y2="122" stroke="#2a3350" stroke-width="1.5"/>
  <polygon points="675,122 685,122 680,130" fill="#2a3350"/>

  <rect x="598" y="130" width="164" height="36" rx="6" fill="#1e2535" stroke="#f59e0b" stroke-width="1"/>
  <text x="680" y="146" fill="#f59e0b" font-size="10" text-anchor="middle" font-weight="700">Acoustic DSP</text>
  <text x="680" y="159" fill="#64748b" font-size="9" text-anchor="middle">FMCW · TDOA localise</text>

  <line x1="680" y1="166" x2="680" y2="180" stroke="#2a3350" stroke-width="1.5"/>
  <polygon points="675,180 685,180 680,188" fill="#2a3350"/>

  <rect x="598" y="188" width="164" height="36" rx="6" fill="#1e2535" stroke="#ef4444" stroke-width="1"/>
  <text x="680" y="204" fill="#ef4444" font-size="10" text-anchor="middle" font-weight="700">Neuromotor</text>
  <text x="680" y="217" fill="#64748b" font-size="9" text-anchor="middle">Tremor · Gait · UPDRS</text>

  <line x1="680" y1="224" x2="680" y2="238" stroke="#2a3350" stroke-width="1.5"/>
  <polygon points="675,238 685,238 680,246" fill="#2a3350"/>

  <rect x="598" y="246" width="164" height="36" rx="6" fill="#1e2535" stroke="#a78bfa" stroke-width="1"/>
  <text x="680" y="262" fill="#a78bfa" font-size="10" text-anchor="middle" font-weight="700">Attention Fusion</text>
  <text x="680" y="275" fill="#64748b" font-size="9" text-anchor="middle">WASM · multi-modal</text>

  <line x1="680" y1="282" x2="680" y2="296" stroke="#2a3350" stroke-width="1.5"/>
  <polygon points="675,296 685,296 680,304" fill="#2a3350"/>

  <rect x="598" y="304" width="164" height="36" rx="6" fill="#1e2535" stroke="#22c55e" stroke-width="1"/>
  <text x="680" y="320" fill="#22c55e" font-size="10" text-anchor="middle" font-weight="700">3D Dashboard</text>
  <text x="680" y="333" fill="#64748b" font-size="9" text-anchor="middle">Three.js · Floor plan</text>

  <!-- Arrow from scene to pipeline -->
  <line x1="562" y1="280" x2="578" y2="280" stroke="#2a3350" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Title -->
  <text x="680" y="390" fill="#64748b" font-size="9" text-anchor="middle">PhysicSense — How it works</text>
</svg>
