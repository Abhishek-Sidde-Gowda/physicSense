<svg viewBox="0 0 780 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <rect width="780" height="300" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="390" y="28" fill="#e2e8f0" font-size="13" text-anchor="middle" font-weight="700">Neuromotor Classification Pipeline</text>

  <!-- Input signal -->
  <rect x="20" y="50" width="110" height="60" rx="8" fill="#1e2535" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="75" y="74" fill="#60a5fa" font-size="10" text-anchor="middle" font-weight="700">Raw Signal</text>
  <text x="75" y="88" fill="#64748b" font-size="9" text-anchor="middle">1 kHz · 1 s</text>
  <text x="75" y="101" fill="#64748b" font-size="9" text-anchor="middle">micro-Doppler</text>

  <!-- Arrow -->
  <line x1="130" y1="80" x2="155" y2="80" stroke="#2a3350" stroke-width="1.5"/>
  <polygon points="152,76 162,80 152,84" fill="#2a3350"/>

  <!-- Filter bank -->
  <rect x="162" y="40" width="130" height="100" rx="8" fill="#161b27" stroke="#2a3350" stroke-width="1.5"/>
  <text x="227" y="58" fill="#64748b" font-size="9" text-anchor="middle" font-weight="700" letter-spacing="1">FILTER BANK</text>

  <rect x="170" y="63" width="114" height="20" rx="4" fill="#1e2535" stroke="#ef4444" stroke-width="1"/>
  <text x="227" y="76" fill="#ef4444" font-size="9" text-anchor="middle" font-weight="600">Parkinsonian 3–6 Hz</text>

  <rect x="170" y="87" width="114" height="20" rx="4" fill="#1e2535" stroke="#f59e0b" stroke-width="1"/>
  <text x="227" y="100" fill="#f59e0b" font-size="9" text-anchor="middle" font-weight="600">Essential 4–12 Hz</text>

  <rect x="170" y="111" width="114" height="20" rx="4" fill="#1e2535" stroke="#3b82f6" stroke-width="1"/>
  <text x="227" y="124" fill="#60a5fa" font-size="9" text-anchor="middle" font-weight="600">Physiological 8–12 Hz</text>

  <!-- Arrow -->
  <line x1="292" y1="90" x2="317" y2="90" stroke="#2a3350" stroke-width="1.5"/>
  <polygon points="314,86 324,90 314,94" fill="#2a3350"/>

  <!-- Band power -->
  <rect x="324" y="50" width="110" height="80" rx="8" fill="#1e2535" stroke="#2a3350" stroke-width="1.5"/>
  <text x="379" y="68" fill="#64748b" font-size="9" text-anchor="middle" font-weight="700" letter-spacing="1">BAND POWER</text>
  <text x="379" y="84" fill="#ef4444" font-size="9" text-anchor="middle">p_park = 0.72</text>
  <text x="379" y="98" fill="#f59e0b" font-size="9" text-anchor="middle">p_ess  = 0.19</text>
  <text x="379" y="112" fill="#60a5fa" font-size="9" text-anchor="middle">p_phys = 0.09</text>

  <!-- Arrow -->
  <line x1="434" y1="90" x2="459" y2="90" stroke="#2a3350" stroke-width="1.5"/>
  <polygon points="456,86 466,90 456,94" fill="#2a3350"/>

  <!-- Classifier -->
  <rect x="466" y="50" width="110" height="80" rx="8" fill="#1e2535" stroke="#ef4444" stroke-width="1.5"/>
  <text x="521" y="68" fill="#64748b" font-size="9" text-anchor="middle" font-weight="700" letter-spacing="1">CLASSIFIER</text>
  <text x="521" y="84" fill="#ef4444" font-size="10" text-anchor="middle" font-weight="700">Parkinsonian</text>
  <text x="521" y="98" fill="#64748b" font-size="9" text-anchor="middle">p_park &gt; 0.40</text>
  <text x="521" y="115" fill="#64748b" font-size="9" text-anchor="middle">dominant band</text>

  <!-- Arrow -->
  <line x1="576" y1="90" x2="601" y2="90" stroke="#2a3350" stroke-width="1.5"/>
  <polygon points="598,86 608,90 598,94" fill="#2a3350"/>

  <!-- UPDRS score -->
  <rect x="608" y="50" width="150" height="80" rx="8" fill="#1e2535" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="683" y="68" fill="#64748b" font-size="9" text-anchor="middle" font-weight="700" letter-spacing="1">UPDRS PROXY</text>
  <text x="683" y="86" fill="#a78bfa" font-size="22" text-anchor="middle" font-weight="800">4.8</text>
  <text x="683" y="100" fill="#64748b" font-size="9" text-anchor="middle">out of 8.0</text>
  <rect x="616" y="108" width="134" height="14" rx="4" fill="#161b27"/>
  <rect x="616" y="108" width="80" height="14" rx="4" fill="#ef4444" opacity="0.7"/>
  <text x="683" y="119" fill="#fff" font-size="8" text-anchor="middle">⚠ Flag for review</text>

  <!-- Gait section (bottom row) -->
  <text x="390" y="170" fill="#e2e8f0" font-size="11" text-anchor="middle" font-weight="700">Gait Analysis</text>

  <!-- Gait cards -->
  <rect x="20" y="185" width="160" height="85" rx="8" fill="#1e2535" stroke="#22c55e" stroke-width="1.5"/>
  <text x="100" y="203" fill="#64748b" font-size="9" text-anchor="middle" font-weight="700" letter-spacing="1">STEP DETECTOR</text>
  <text x="100" y="222" fill="#22c55e" font-size="18" text-anchor="middle" font-weight="800">118</text>
  <text x="100" y="236" fill="#64748b" font-size="9" text-anchor="middle">cadence (spm)</text>
  <text x="100" y="260" fill="#64748b" font-size="8" text-anchor="middle">threshold 0.15 · peak track</text>

  <rect x="200" y="185" width="160" height="85" rx="8" fill="#1e2535" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="280" y="203" fill="#64748b" font-size="9" text-anchor="middle" font-weight="700" letter-spacing="1">ASYMMETRY INDEX</text>
  <text x="280" y="222" fill="#f59e0b" font-size="18" text-anchor="middle" font-weight="800">0.12</text>
  <text x="280" y="236" fill="#64748b" font-size="9" text-anchor="middle">AI score</text>
  <text x="280" y="260" fill="#64748b" font-size="8" text-anchor="middle">|odd−even| / (odd+even)</text>

  <rect x="380" y="185" width="160" height="85" rx="8" fill="#1e2535" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="460" y="203" fill="#64748b" font-size="9" text-anchor="middle" font-weight="700" letter-spacing="1">STRIDE CV</text>
  <text x="460" y="222" fill="#60a5fa" font-size="18" text-anchor="middle" font-weight="800">4.2%</text>
  <text x="460" y="236" fill="#64748b" font-size="9" text-anchor="middle">inter-stride σ/μ</text>
  <text x="460" y="260" fill="#64748b" font-size="8" text-anchor="middle">normal &lt; 3 %</text>

  <rect x="560" y="185" width="200" height="85" rx="8" fill="#1e2535" stroke="#ef4444" stroke-width="1.5"/>
  <text x="660" y="203" fill="#64748b" font-size="9" text-anchor="middle" font-weight="700" letter-spacing="1">FOG RISK</text>
  <text x="660" y="228" fill="#ef4444" font-size="16" text-anchor="middle" font-weight="800">MEDIUM</text>
  <text x="660" y="245" fill="#64748b" font-size="8" text-anchor="middle">Freezing of Gait risk score</text>
  <text x="660" y="260" fill="#64748b" font-size="8" text-anchor="middle">cadence drop + high CV</text>
</svg>
